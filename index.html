<script>
(function () {
  "use strict";

  /* ==========================================================
     1. NAVIGATION CONFIG
     ========================================================== */
  const SECTIONS = [
    { id: "dashboard",  label: "Dashboard",          icon: "◆", phase: null },
    { id: "insights",   label: "AI Insights",        icon: "✳", phase: null },
    { id: "mortgage",   label: "Mortgage Planner",   icon: "⌂", phase: null },
    { id: "cashflow",   label: "Cash Flow",          icon: "≋", phase: null },
    { id: "ledger",     label: "Ledger",             icon: "▥", phase: null },
    { id: "retirement", label: "Retirement",         icon: "◔", phase: null },
    { id: "family",     label: "Family Planner",     icon: "✦", phase: null },
    { id: "travel",     label: "Travel",             icon: "✈", phase: null },
    { id: "goals",      label: "Goal Tracker",       icon: "◎", phase: null },
    { id: "simulator",  label: "Scenario Simulator", icon: "⇌", phase: null },
    { id: "reports",    label: "Reports",            icon: "▤", phase: null },
    { id: "settings",   label: "Settings",           icon: "⚙", phase: null },
  ];

  const SCHEMA_VERSION = 1;

  /* ==========================================================
     2. DATA MODEL + LOCALSTORAGE LAYER
     ========================================================== */
  const STORAGE_KEY = "financialgodun.profile";
  const THEME_KEY = "financialgodun.theme";
  // API key lives in its own localStorage entry, deliberately outside the
  // `profile` object — so it's never swept into JSON Backup/Restore or the
  // Reports exports. Sharing a backup file should never leak a secret.
  const AI_KEY_STORAGE = "financialgodun.aiApiKey";

  function defaultProfile() {
    return {
      schemaVersion: SCHEMA_VERSION,
      settings: {
        theme: "light",
        currency: "PHP",
        inflationRate: 3.5,
        investmentReturn: 7,
        creditSourcesMigrated: false,
        palette: "sunshine",
        customBackground: null,
        customCardBackground: null,
      },
      income: {
        salary: 0,
        bonus: 0,
        other: 0,
      },
      expenses: {
        living: 0,
        child: 0,
      },
      assets: {
        cash: 0,
        emergencyFund: 0,
        investments: 0,
        houseValue: 0,
        vehicleValue: 0,
      },
      liabilities: {
        creditCard: 0,
        personalLoans: 0,
      },
      // Credit Sources replace the old single Cash/Credit Card fields above
      // (kept in the schema for backward-compat migration only — see
      // migrateCreditSources()). Each source: {id, name, type, balance}.
      // type: "cash" | "debit" | "wallet" (liquid assets), "credit_card"
      // (liability — balance = amount currently owed), or "potential"
      // (expected income not yet in hand — excluded from net worth).
      creditSources: [],
      // Actual logged transactions — separate from the budgeted/assumed
      // monthly figures in Settings. category maps to Living/Travel/Child/
      // Other so actual-vs-budget comparisons are possible.
      expenseLog: [],
      mortgage: {
        balance: 0,
        interestRate: 0,
        repricingRate: 0,
        fixedYears: 5,
        monthlyPayment: 0,
        startDate: "",
        paymentStartDate: "",
        extraPayment: 0,
        originalAmount: 0,
        annualPrepayment: 0,
        prepaymentSchedule: [],
      },
      goals: {
        houseExtension: 0,
        houseExtensionYear: 0,
        houseExtensionMonth: 1,
        wedding: 0,
        furnishing: 0,
        furnishingYear: 0,
        furnishingMonth: 1,
        travelAnnual: 0,
        retirementMonthly: 0,
      },
      retirement: {
        currentBalance: 0,
        targetBalance: 0,
        currentAge: 0,
        retirementAge: 65,
        startYear: 0,
      },
      family: {
        pregnancyCost: 0,
        babyCost: 0,
        childcareMonthly: 0,
        educationFundTarget: 0,
        childStartYear: 0,
        weddingYear: 0,
        weddingMonth: 1,
        babyYear: 0,
        babyMonth: 1,
      },
      vehicle: {
        fundTarget: 0,
        purchaseYear: 0,
        purchaseMonth: 1,
      },
      travel: {
        trips: [],
        actualExpenses: 0,
      },
      goalProgress: {
        wedding: 0,
        houseExtension: 0,
        furnishing: 0,
        travelAnnual: 0,
        educationFund: 0,
        vehicleFund: 0,
      },
      savedScenarios: [],
      monthlyBudget: {},
      // Per-year array of 12 {amount, description} — a saved entry here
      // overrides the auto-computed Wedding/Baby/Vehicle/House amount for
      // that specific month, same precedence pattern as monthlyBudget.
      monthlyBigExpenses: {},
    };
  }

  function deepMerge(base, incoming) {
    // Merges incoming JSON onto the default shape so older/partial
    // backups don't crash newer app versions with missing fields.
    const out = Array.isArray(base) ? [...base] : { ...base };
    for (const key in incoming) {
      if (incoming[key] && typeof incoming[key] === "object" && !Array.isArray(incoming[key]) &&
          base[key] && typeof base[key] === "object" && !Array.isArray(base[key])) {
        out[key] = deepMerge(base[key], incoming[key]);
      } else {
        out[key] = incoming[key];
      }
    }
    return out;
  }

  // One-time migration: older profiles had a single flat Cash balance and
  // a single flat Credit Card liability. Credit Sources replace both with
  // a list, so on first load after upgrading, seed one source per legacy
  // field that had a real value — never re-runs once migrated is true,
  // so deleting sources afterward doesn't cause them to reappear.
  function migrateCreditSources(profile) {
    if (profile.settings.creditSourcesMigrated) return profile;
    if (profile.creditSources.length === 0) {
      if (profile.assets.cash > 0) {
        profile.creditSources.push({ id: "src_cash_migrated", name: "Cash", type: "cash", balance: profile.assets.cash });
      }
      if (profile.liabilities.creditCard > 0) {
        profile.creditSources.push({ id: "src_cc_migrated", name: "Credit Card", type: "credit_card", balance: profile.liabilities.creditCard });
      }
    }
    profile.settings.creditSourcesMigrated = true;
    return profile;
  }

  const Store = {
    load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) { const p = defaultProfile(); p.settings.creditSourcesMigrated = true; return p; }
        const parsed = JSON.parse(raw);
        return migrateCreditSources(deepMerge(defaultProfile(), parsed));
      } catch (e) {
        console.error("FinancialGodun: failed to load profile, resetting.", e);
        return defaultProfile();
      }
    },
    save(profile) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(profile));
        return true;
      } catch (e) {
        console.error("FinancialGodun: failed to save profile.", e);
        showToast("Save failed — storage may be full.");
        return false;
      }
    },
    reset() {
      localStorage.removeItem(STORAGE_KEY);
      return defaultProfile();
    },
  };

  let profile = Store.load();

  /* ==========================================================
     3. THEME
     ========================================================== */
  const THEME_PALETTES = [
    { id: "sunshine", name: "Sunshine", swatchInk: "#FBF3D9", swatchAccent: "#E8677D" },
    { id: "wellness-coral", name: "Wellness Coral", swatchInk: "#FFADA0", swatchAccent: "#FF7A68" },
    { id: "wellness-citrus", name: "Wellness Citrus", swatchInk: "#FFE29A", swatchAccent: "#FF9142" },
    { id: "wellness-berry", name: "Wellness Berry", swatchInk: "#FF9EB8", swatchAccent: "#E0447E" },
    { id: "wellness-ocean", name: "Wellness Ocean", swatchInk: "#A6E6D4", swatchAccent: "#2196C4" },
    { id: "wellness-earth", name: "Wellness Earth", swatchInk: "#F0B49A", swatchAccent: "#D9714A" },
    { id: "aurora", name: "Aurora Glass", swatchInk: "#FBD9C9", swatchAccent: "#9B8AE0" },
    { id: "aurora-sunset", name: "Aurora Sunset", swatchInk: "#FCC9A8", swatchAccent: "#E8824A" },
    { id: "aurora-ocean", name: "Aurora Ocean", swatchInk: "#B9E3E8", swatchAccent: "#2E93C4" },
    { id: "aurora-berry", name: "Aurora Berry", swatchInk: "#F0C0DE", swatchAccent: "#C6408A" },
    { id: "brass", name: "Brass Ledger", swatchInk: "#0F1A24", swatchAccent: "#C9A464" },
    { id: "verdant", name: "Verdant Ledger", swatchInk: "#101A14", swatchAccent: "#8FB37A" },
    { id: "rosewood", name: "Rosewood", swatchInk: "#1A1013", swatchAccent: "#C98A8F" },
    { id: "slate", name: "Slate & Steel", swatchInk: "#12161C", swatchAccent: "#8FA6C2" },
    { id: "teal", name: "Midnight Teal", swatchInk: "#0B1918", swatchAccent: "#C9A468" },
  ];

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    document.getElementById("themeIcon").textContent = theme === "dark" ? "☾" : "☀";
    document.getElementById("themeLabel").textContent = theme === "dark" ? "DARK" : "LIGHT";
    profile.settings.theme = theme;
    localStorage.setItem(THEME_KEY, theme);
  }

  function applyPalette(palette) {
    document.documentElement.setAttribute("data-palette", palette);
    profile.settings.palette = palette;
  }

  // Small HSL color-math helpers so a single picked background color can
  // derive matching card/border/text tones automatically, rather than
  // requiring the person to pick 6+ coordinated colors by hand.
  function hexToHsl(hex) {
    hex = hex.replace("#", "");
    const r = parseInt(hex.substr(0, 2), 16) / 255;
    const g = parseInt(hex.substr(2, 2), 16) / 255;
    const b = parseInt(hex.substr(4, 2), 16) / 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;
    if (max === min) { h = s = 0; }
    else {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
      else if (max === g) h = (b - r) / d + 2;
      else h = (r - g) / d + 4;
      h /= 6;
    }
    return { h: h * 360, s: s * 100, l: l * 100 };
  }
  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const c = (1 - Math.abs(2 * l - 1)) * s;
    const x = c * (1 - Math.abs((h / 60) % 2 - 1));
    const m = l - c / 2;
    let r, g, b;
    if (h < 60) { r = c; g = x; b = 0; }
    else if (h < 120) { r = x; g = c; b = 0; }
    else if (h < 180) { r = 0; g = c; b = x; }
    else if (h < 240) { r = 0; g = x; b = c; }
    else if (h < 300) { r = x; g = 0; b = c; }
    else { r = c; g = 0; b = x; }
    const toHex = v => Math.round((v + m) * 255).toString(16).padStart(2, "0");
    return "#" + toHex(r) + toHex(g) + toHex(b);
  }
  function adjustLightness(hex, delta) {
    const { h, s, l } = hexToHsl(hex);
    return hslToHex(h, s, Math.max(0, Math.min(100, l + delta)));
  }

  const CUSTOM_BG_PROPS = ["--ink", "--ink-raised", "--ink-card", "--ink-card-hover", "--stitch", "--stitch-soft", "--paper", "--paper-dim", "--paper-faint"];
  const CUSTOM_CARD_BG_PROPS = ["--ink-card", "--ink-card-hover"];

  // Applies a custom background as an inline style on <html> (which
  // outranks any palette's CSS class rules regardless of source order),
  // deriving raised/card/border tones and a readable text color from the
  // background's own lightness rather than the active palette's. Also
  // derives a coordinated default card color — applyCustomCardBackground
  // below can independently override just that part afterward.
  function applyCustomBackground(hex) {
    const { l } = hexToHsl(hex);
    const isDark = l < 50;
    const root = document.documentElement.style;
    root.setProperty("--ink", hex);
    if (isDark) {
      root.setProperty("--ink-raised", adjustLightness(hex, 4));
      root.setProperty("--ink-card", adjustLightness(hex, 9));
      root.setProperty("--ink-card-hover", adjustLightness(hex, 13));
      root.setProperty("--stitch", adjustLightness(hex, 17));
      root.setProperty("--stitch-soft", adjustLightness(hex, 12));
      root.setProperty("--paper", "#F2F0EA");
      root.setProperty("--paper-dim", adjustLightness(hex, 55));
      root.setProperty("--paper-faint", adjustLightness(hex, 35));
    } else {
      root.setProperty("--ink-raised", adjustLightness(hex, -5));
      root.setProperty("--ink-card", adjustLightness(hex, 7));
      root.setProperty("--ink-card-hover", adjustLightness(hex, -2));
      root.setProperty("--stitch", adjustLightness(hex, -14));
      root.setProperty("--stitch-soft", adjustLightness(hex, -9));
      root.setProperty("--paper", "#1A1A1A");
      root.setProperty("--paper-dim", adjustLightness(hex, -45));
      root.setProperty("--paper-faint", adjustLightness(hex, -25));
    }
    profile.settings.customBackground = hex;
    // Re-apply any independent card color on top so setting the page
    // background afterward doesn't wipe it out.
    if (profile.settings.customCardBackground) applyCustomCardBackground(profile.settings.customCardBackground, true);
  }

  // Independently overrides just the card/container background (every
  // .ledger-card, .kpi-card, table row, etc.) — separate from the page
  // background above. skipSave avoids re-writing profile.settings during
  // the page-background function's own re-apply call.
  function applyCustomCardBackground(hex, skipSave) {
    const { l } = hexToHsl(hex);
    const isDark = l < 50;
    const root = document.documentElement.style;
    root.setProperty("--ink-card", hex);
    root.setProperty("--ink-card-hover", adjustLightness(hex, isDark ? 5 : -3));
    if (!skipSave) profile.settings.customCardBackground = hex;
  }

  function resetCustomBackground() {
    CUSTOM_BG_PROPS.forEach(p => document.documentElement.style.removeProperty(p));
    profile.settings.customBackground = null;
    // A separately-set card background should survive resetting the page
    // background, since they're independent controls.
    if (profile.settings.customCardBackground) applyCustomCardBackground(profile.settings.customCardBackground, true);
  }

  function resetCustomCardBackground() {
    CUSTOM_CARD_BG_PROPS.forEach(p => document.documentElement.style.removeProperty(p));
    profile.settings.customCardBackground = null;
    // Falls back to the page background's own derived card color if one
    // is still active, rather than jumping straight to the palette default.
    if (profile.settings.customBackground) applyCustomBackground(profile.settings.customBackground);
  }

  function initTheme() {
    const saved = localStorage.getItem(THEME_KEY) || profile.settings.theme || "dark";
    applyTheme(saved);
    applyPalette(profile.settings.palette || "brass");
    if (profile.settings.customBackground) applyCustomBackground(profile.settings.customBackground);
    else if (profile.settings.customCardBackground) applyCustomCardBackground(profile.settings.customCardBackground, true);
  }

  document.getElementById("themeToggle").addEventListener("click", () => {
    const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    applyTheme(next);
    Store.save(profile);
  });

  /* ==========================================================
     4. NAVIGATION RENDER + ROUTING
     ========================================================== */
  const PRIMARY_NAV_IDS = ["dashboard", "ledger", "cashflow", "mortgage"];
  const BOTTOM_NAV_LABELS = { dashboard: "Dashboard", ledger: "Ledger", cashflow: "Cash Flow", mortgage: "Mortgage" };

  function renderNav() {
    const navList = document.getElementById("navList");
    navList.innerHTML = SECTIONS.map((s, i) => `
      <li>
        <button class="nav-item" data-section="${s.id}" type="button">
          <span class="nav-icon">${s.icon}</span>
          <span>${s.label}</span>
          <span class="nav-index">${String(i + 1).padStart(2, "0")}</span>
        </button>
      </li>
    `).join("");

    navList.querySelectorAll(".nav-item").forEach(btn => {
      btn.addEventListener("click", () => {
        navigateTo(btn.dataset.section);
        document.getElementById("app").classList.remove("nav-open");
      });
    });
  }

  // Mobile-only: 4 most-used sections thumb-reachable at the bottom of the
  // screen, plus "More" opening the same drawer as before for the rest.
  function renderBottomNav() {
    const bottomNav = document.getElementById("bottomNav");
    const primaryButtons = PRIMARY_NAV_IDS.map(id => {
      const s = SECTIONS.find(sec => sec.id === id);
      return `
        <button class="bottom-nav-item" data-section="${id}" type="button">
          <span class="nav-icon">${s.icon}</span>
          <span>${BOTTOM_NAV_LABELS[id]}</span>
        </button>
      `;
    }).join("");
    bottomNav.innerHTML = primaryButtons + `
      <button class="bottom-nav-item" data-more="true" type="button">
        <span class="nav-icon">☰</span>
        <span>More</span>
      </button>
    `;

    bottomNav.querySelectorAll("[data-section]").forEach(btn => {
      btn.addEventListener("click", () => {
        navigateTo(btn.dataset.section);
        document.getElementById("app").classList.remove("nav-open");
      });
    });
    bottomNav.querySelector("[data-more]").addEventListener("click", () => {
      document.getElementById("app").classList.toggle("nav-open");
    });
  }

  function navigateTo(sectionId) {
    document.querySelectorAll(".nav-item").forEach(b =>
      b.classList.toggle("active", b.dataset.section === sectionId));
    document.querySelectorAll(".section").forEach(s =>
      s.classList.toggle("active", s.id === "section-" + sectionId));
    document.querySelectorAll(".bottom-nav-item[data-section]").forEach(b =>
      b.classList.toggle("active", b.dataset.section === sectionId));
    const moreBtn = document.querySelector(".bottom-nav-item[data-more]");
    if (moreBtn) moreBtn.classList.toggle("active", !PRIMARY_NAV_IDS.includes(sectionId));
    window.location.hash = sectionId;

    // Charts need a visible (non display:none) canvas to size against,
    // so draw them only once their section is the active one.
    if (sectionId === "dashboard") drawDashboardCharts();
    if (sectionId === "retirement") drawRetirementChart();
    if (sectionId === "simulator") updateSimulatorView();
    if (sectionId === "mortgage") { drawMortgageCharts(); updatePrepayExplorer(); }
    if (sectionId === "cashflow") drawCashflowCharts();
    if (sectionId === "ledger") drawLedgerChart();
  }

  /* ==========================================================
     4.5 CALCULATION ENGINE
     Pure functions, no DOM access. Shared by Mortgage Planner,
     Cash Flow Planner, and later Dashboard / Scenario Simulator.
     ========================================================== */
  function formatCurrency(value, currency) {
    const code = currency || profile.settings.currency || "PHP";
    const symbol = code === "PHP" ? "₱" : "$";
    const n = Number(value) || 0;
    const abs = Math.abs(n);
    return (n < 0 ? "-" : "") + symbol + abs.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  // ---- Live comma-formatting for amount inputs (400000 -> 400,000) ----
  // Inputs holding formatted numbers are type="text" (native type="number"
  // rejects commas outright), marked with data-numfmt so a single
  // delegated listener can handle every one of them without attaching
  // per-field listeners.
  function formatNumberString(raw) {
    if (raw == null) return "";
    let str = String(raw).replace(/[^\d.]/g, "");
    const firstDot = str.indexOf(".");
    if (firstDot !== -1) {
      str = str.slice(0, firstDot + 1) + str.slice(firstDot + 1).replace(/\./g, "");
    }
    let [intPart, decPart] = str.split(".");
    intPart = (intPart || "").replace(/^0+(?=\d)/, "");
    if (intPart === "") intPart = str.startsWith(".") ? "0" : "";
    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    return decPart != null ? intPart + "." + decPart.slice(0, 2) : intPart;
  }

  // Reads the numeric value out of a possibly comma-formatted input —
  // every save handler that used to do parseFloat(input.value) on a
  // data-path field now goes through this instead.
  function getNumValue(el) {
    if (!el) return 0;
    return parseFloat(String(el.value).replace(/,/g, "")) || 0;
  }

  function handleLiveNumberFormat(e) {
    const input = e.target;
    const oldValue = input.value;
    const oldCursor = input.selectionStart == null ? oldValue.length : input.selectionStart;
    const digitsBeforeCursor = oldValue.slice(0, oldCursor).replace(/[^\d.]/g, "").length;
    const newValue = formatNumberString(oldValue);
    input.value = newValue;
    // Re-derive cursor position by counting the same number of raw
    // digits/decimal-point characters back in from the start of the
    // reformatted string, rather than a naive length-delta shift — that
    // keeps the cursor stable even when multiple commas shift at once.
    let seen = 0, newCursor = newValue.length;
    for (let i = 0; i < newValue.length; i++) {
      if (/[\d.]/.test(newValue[i])) seen++;
      if (seen >= digitsBeforeCursor) { newCursor = i + 1; break; }
    }
    if (digitsBeforeCursor === 0) newCursor = 0;
    input.setSelectionRange(newCursor, newCursor);
  }

  document.addEventListener("input", (e) => {
    if (e.target && e.target.matches && e.target.matches("[data-numfmt]")) {
      handleLiveNumberFormat(e);
    }
  });

  // ---- Inline calculator, launched from a small link under amount
  // fields — evaluates a basic arithmetic expression and writes the
  // result back into whichever input triggered it. ----
  let calcTargetId = null;

  function evalCalcExpression(rawExpr) {
    const expr = String(rawExpr || "").replace(/×/g, "*").replace(/÷/g, "/").replace(/,/g, "");
    if (!expr || !/^[\d+\-*/().\s]*$/.test(expr)) return null;
    try {
      // eslint-disable-next-line no-new-func
      const result = Function('"use strict"; return (' + expr + ")")();
      return typeof result === "number" && isFinite(result) ? result : null;
    } catch (e) {
      return null;
    }
  }

  function openCalculator(targetId) {
    calcTargetId = targetId;
    const targetInput = document.getElementById(targetId);
    const modal = document.getElementById("calcModal");
    const exprInput = document.getElementById("calcExpression");
    if (!modal || !exprInput) return;
    exprInput.value = targetInput ? String(getNumValue(targetInput) || "") : "";
    updateCalcResult();
    modal.style.display = "flex";
    exprInput.focus();
    exprInput.select();
  }

  function closeCalculator() {
    const modal = document.getElementById("calcModal");
    if (modal) modal.style.display = "none";
    calcTargetId = null;
  }

  function updateCalcResult() {
    const exprInput = document.getElementById("calcExpression");
    const resultEl = document.getElementById("calcResult");
    if (!exprInput || !resultEl) return;
    const result = evalCalcExpression(exprInput.value);
    resultEl.textContent = result == null ? "—" : formatCurrency(result);
    resultEl.dataset.value = result == null ? "" : String(result);
  }

  document.addEventListener("click", (e) => {
    const trigger = e.target.closest("[data-calc-target]");
    if (trigger) { e.preventDefault(); openCalculator(trigger.dataset.calcTarget); return; }
    if (e.target.id === "calcCancel" || e.target.id === "calcModal") { closeCalculator(); return; }
    if (e.target.id === "calcUseValue") {
      const resultEl = document.getElementById("calcResult");
      const targetInput = calcTargetId && document.getElementById(calcTargetId);
      if (targetInput && resultEl && resultEl.dataset.value !== "") {
        targetInput.value = formatNumberString(resultEl.dataset.value);
        targetInput.dispatchEvent(new Event("change", { bubbles: true }));
      }
      closeCalculator();
    }
  });
  document.addEventListener("input", (e) => {
    if (e.target.id === "calcExpression") updateCalcResult();
  });
  document.addEventListener("keydown", (e) => {
    if (e.target.id === "calcExpression" && e.key === "Enter") {
      e.preventDefault();
      document.getElementById("calcUseValue").click();
    }
  });

  // Converts a relative projection offset (0 = today) into the calendar
  // year it actually lands in, e.g. today=Jul 2026 → offset 1 → 2027.
  // Used everywhere a chart/table would otherwise show a bare "Year N".
  function calendarYearFor(offset) {
    return new Date().getFullYear() + offset;
  }

  // Whether recurring child expenses (and childcare) should be counted at
  // a given projection offset (0 = today). childStartYear defaults to 0,
  // meaning "already active" — preserves existing behavior for anyone who
  // already has a child. Set it higher (e.g. 2) to model a child arriving
  // a couple years out, so expenses don't apply until then.
  function isChildActive(profile, yearOffset) {
    return (profile.family.childStartYear || 0) <= yearOffset;
  }

  // Same pattern as isChildActive — retirement.startYear defaults to 0
  // (contribute now), or set higher to delay when saving actually begins.
  function isRetirementSavingActive(profile, yearOffset) {
    return (profile.retirement.startYear || 0) <= yearOffset;
  }

  function monthsSince(dateStr) {
    if (!dateStr) return 0;
    const start = new Date(dateStr);
    if (isNaN(start)) return 0;
    const now = new Date();
    return Math.max(0, (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth()));
  }

  // Months from today until a future date (0 if the date is unset, invalid,
  // or already in the past). Used for paymentStartDate, where a loan sits
  // dormant until its first scheduled payment.
  function monthsUntil(dateStr) {
    if (!dateStr) return 0;
    const target = new Date(dateStr);
    if (isNaN(target)) return 0;
    const now = new Date();
    const months = (target.getFullYear() - now.getFullYear()) * 12 + (target.getMonth() - now.getMonth());
    return Math.max(0, months);
  }

  // Determines whether a given future month (0 = next payment) falls inside
  // the remaining fixed-rate period or the repriced period. `overrides` lets
  // the future Scenario Simulator pass a temporary repricingRate without
  // touching the saved profile — see getEffectiveMortgageRate below.
  function getEffectiveMortgageRate(monthIndex, mortgage, overrides) {
    const elapsedInFixed = monthsSince(mortgage.startDate);
    const monthsRemainingFixed = Math.max(0, (mortgage.fixedYears * 12) - elapsedInFixed);
    if (monthIndex < monthsRemainingFixed) return mortgage.interestRate;
    return (overrides && overrides.repricingRate != null) ? overrides.repricingRate : mortgage.repricingRate;
  }

  // Simulates the amortization schedule forward from today's balance.
  // Stops early (insufficientPayment: true) if the payment can't cover
  // interest after repricing, rather than projecting a misleading schedule.
  // If paymentStartDate is set in the future, the loan sits dormant (no
  // interest charged, balance unchanged) until that month — models a grace
  // period before the first amortized payment, e.g. a newly-released loan.
  // Prepayment amount for each future year (1 = 12 payments from now) is
  // resolved from the flat annualPrepayment default (from the saved
  // mortgage or a temporary override, e.g. the Prepayment Explorer). The
  // lump sum is applied straight to principal on the 12th payment of that
  // year.
  function computeAmortization(mortgage, overrides) {
    const maxMonths = 600; // 50-year safety cap
    const schedule = [];
    let balance = mortgage.balance;
    let totalInterest = 0;
    let totalPrepaid = 0;
    let insufficientPayment = false;
    const payment = mortgage.monthlyPayment + (mortgage.extraPayment || 0);
    const defaultPrepayment = (overrides && overrides.annualPrepayment != null) ? overrides.annualPrepayment : (mortgage.annualPrepayment || 0);
    // monthsUntil counts month-boundaries to the target month, but index 0
    // in this schedule already represents next month — so subtract 1 to
    // make the target month itself the first active (paid) month, not the
    // month after it.
    const delayMonths = Math.max(0, monthsUntil(mortgage.paymentStartDate) - 1);
    const today = new Date();

    for (let i = 0; i < maxMonths && balance > 0.01; i++) {
      const date = new Date(today.getFullYear(), today.getMonth() + i + 1, 1);

      if (i < delayMonths) {
        schedule.push({ monthIndex: i, date, rate: getEffectiveMortgageRate(i, mortgage, overrides), interest: 0, principal: 0, lumpSum: 0, balance, dormant: true });
        continue;
      }

      const rate = getEffectiveMortgageRate(i, mortgage, overrides);
      const monthlyInterest = balance * (rate / 100 / 12);
      let principal = payment - monthlyInterest;

      if (payment <= 0 || principal <= 0) {
        insufficientPayment = true;
        schedule.push({ monthIndex: i, date, rate, interest: monthlyInterest, principal: 0, lumpSum: 0, balance });
        break;
      }
      if (principal > balance) principal = balance;
      balance -= principal;
      totalInterest += monthlyInterest;

      let lumpSum = 0;
      // Year numbering here is shifted by one month relative to the raw
      // schedule index (which starts counting at "next month") so that
      // "Year 1" in the Prepayment Schedule lines up with Cash Flow and
      // Monthly Forecast's own Year 1 (which starts at the current
      // month). Without this shift, a Year 1 prepayment would land one
      // month later than every other Year-1-labeled figure in the app.
      if (balance > 0.01 && (i + 2 - delayMonths) % 12 === 0) {
        if (defaultPrepayment > 0) {
          lumpSum = Math.min(defaultPrepayment, balance);
          balance -= lumpSum;
          totalPrepaid += lumpSum;
        }
      }

      schedule.push({ monthIndex: i, date, rate, interest: monthlyInterest, principal, lumpSum, balance });
    }

    return {
      schedule,
      totalInterest,
      totalPrepaid,
      payoffDate: schedule.length ? schedule[schedule.length - 1].date : null,
      payoffMonths: schedule.length,
      delayMonths,
      insufficientPayment,
    };
  }

  // Total interest saved from ALL current prepayment settings combined
  // (recurring Extra Payment + flat annual default + year-specific
  // schedule overrides), vs. paying none of them.
  function computeInterestSaved(mortgage, overrides) {
    const o = overrides || {};
    const hasAny = mortgage.extraPayment || mortgage.annualPrepayment || o.annualPrepayment != null;
    if (!hasAny) return 0;
    const withPrepay = computeAmortization(mortgage, o);
    const withoutPrepay = computeAmortization({ ...mortgage, extraPayment: 0, annualPrepayment: 0, prepaymentSchedule: [] });
    return Math.max(0, withoutPrepay.totalInterest - withPrepay.totalInterest);
  }

  // The direct link between "how am I actually spending this month" and
  // "when do I finish my mortgage" — this month's real surplus (already
  // reflecting actual logged expenses via computeCashFlow, not just
  // budget) simulated as a one-time extra principal payment right now.
  function computeMortgageSurplusImpact(profile) {
    const cf = computeCashFlow(profile);
    const surplus = Math.max(0, cf.monthlySurplus);
    const baseline = computeAmortization(profile.mortgage);
    const withSurplus = surplus > 0
      ? computeAmortization({ ...profile.mortgage, balance: Math.max(0, profile.mortgage.balance - surplus) })
      : baseline;
    const monthsSaved = Math.max(0, baseline.payoffMonths - withSurplus.payoffMonths);
    const interestSaved = Math.max(0, baseline.totalInterest - withSurplus.totalInterest);
    return {
      surplus,
      monthlySurplus: cf.monthlySurplus,
      baselinePayoffDate: baseline.payoffDate,
      withSurplusPayoffDate: withSurplus.payoffDate,
      monthsSaved, interestSaved,
    };
  }

  // Sums actual logged expenses for one specific calendar month, by
  // category. Used to let real Ledger data override budgeted assumptions
  // wherever a specific month is known (Cash Flow, Monthly Forecast).
  function getActualExpensesForMonth(profile, calendarYear, calendarMonthIndex) {
    const totals = { living: 0, travel: 0, child: 0, other: 0 };
    profile.expenseLog.forEach(e => {
      const d = new Date(e.date);
      if (isNaN(d) || d.getFullYear() !== calendarYear || d.getMonth() !== calendarMonthIndex) return;
      const cat = totals[e.category] != null ? e.category : "other";
      totals[cat] += e.amount;
    });
    return totals;
  }

  // Resolves what a specific month's Living/Travel/Child/Other should be:
  // actual logged data wins if any exists for that category that month,
  // else a saved manual override (Monthly Forecast), else the generic
  // default. Other has no separate budget assumption elsewhere in the
  // app, so its "default" is just 0 unless actual data or an override
  // sets it.
  function resolveMonthAmounts(profile, calendarYear, calendarMonthIndex, defaults, override) {
    const actual = getActualExpensesForMonth(profile, calendarYear, calendarMonthIndex);
    const living = actual.living > 0 ? actual.living : (override ? override.living : defaults.living);
    const travel = actual.travel > 0 ? actual.travel : (override ? override.travel : defaults.travel);
    const child = actual.child > 0 ? actual.child : (override ? override.child : defaults.child);
    const other = actual.other > 0 ? actual.other : (override && override.other != null ? override.other : (defaults.other || 0));
    return {
      living, travel, child, other,
      isActual: { living: actual.living > 0, travel: actual.travel > 0, child: actual.child > 0, other: actual.other > 0 },
    };
  }

  function computeCashFlow(profile, overrides) {
    const o = overrides || {};
    const p = profile;
    const salary = o.salary != null ? o.salary : p.income.salary;
    const monthlyIncome = salary + p.income.bonus + p.income.other;
    const amort = computeAmortization(p.mortgage, o);
    const currentMortgagePayment = amort.schedule.length ? (amort.schedule[0].interest + amort.schedule[0].principal) : 0;
    // Travel and Child no longer auto-populate from Settings/Travel tab
    // assumptions here — Monthly Forecast is the source of truth for what
    // you're actually planning to spend, so both default to 0 unless
    // actual Ledger data exists or you've entered something for this
    // exact month there (Year 1, Month 1 in Monthly Forecast IS today).
    const todayOverride = overrides ? null : (profile.monthlyBudget["1"] && profile.monthlyBudget["1"][0]);

    // Actual data only applies to the true baseline (no Simulator overrides)
    // — a what-if shouldn't be silently pulled back to what really happened.
    const today = new Date();
    const resolved = overrides
      ? { living: p.expenses.living, travel: (o.travelBudget != null ? o.travelBudget : 0) / 12, child: 0, other: 0 }
      : resolveMonthAmounts(p, today.getFullYear(), today.getMonth(), { living: p.expenses.living, travel: 0, child: 0, other: 0 }, todayOverride);

    const monthlyExpenses = resolved.living + resolved.travel + resolved.child + resolved.other;
    const retirementContribution = o.retirementContribution != null ? o.retirementContribution : (todayOverride && todayOverride.retirement != null ? todayOverride.retirement : (isRetirementSavingActive(p, 0) ? p.goals.retirementMonthly : 0));
    const monthlySurplus = monthlyIncome - monthlyExpenses - currentMortgagePayment - retirementContribution;
    return { monthlyIncome, monthlyExpenses, currentMortgagePayment, retirementContribution, monthlySurplus, amort, resolved };
  }

  // Simplification (v1): income is held flat unless a Scenario Simulator
  // salaryGrowth override is supplied. Living/child/travel expenses are
  // inflated year over year by the assumed Inflation Rate in Settings,
  // then each month is resolved individually — actual Ledger data wins
  // where it exists, else a saved Monthly Forecast override, else the
  // even split of the inflated annual default.
  // Sums whichever big one-time expenses land on this exact (year, month)
  // combination — month is 1-12, position within the given projection
  // year. Used by Monthly Forecast, which tracks these at real month
  // precision (unlike the annual total, which only needs the year).
  // Returns both the amount and a plain-language description, since a
  // bare number doesn't say what it's for. Wedding, House Extension,
  // Furnishing, and Vehicle Fund no longer have dedicated planning UI —
  // those are tracked as free-text Big Expense entries directly in
  // Monthly Forecast now, via monthlyBigExpenses overrides.
  function getOneTimeCostsForMonth(profile, year, monthNum) {
    let total = 0;
    const items = [];
    if (profile.family.babyYear === year && (profile.family.babyMonth || 1) === monthNum && (profile.family.pregnancyCost + profile.family.babyCost) > 0) {
      total += profile.family.pregnancyCost + profile.family.babyCost; items.push("Baby (Pregnancy + Baby Costs)");
    }
    return { total, description: items.join(" + ") };
  }

  function computeTenYearProjection(profile, overrides) {
    const o = overrides || {};
    const isBaseline = !overrides;
    const cf = computeCashFlow(profile, o);
    const salaryGrowth = o.salaryGrowth || 0;
    const baseSalary = o.salary != null ? o.salary : profile.income.salary;
    const today = new Date();
    const years = [];
    for (let y = 1; y <= 10; y++) {
      const inflationFactor = Math.pow(1 + profile.settings.inflationRate / 100, y);
      // Living, Travel, and Child all default flat — Monthly Forecast is
      // the source of truth for what you're actually planning to spend
      // each month, not an auto-inflated or auto-filled assumption. A
      // Scenario Simulator travelBudget what-if still works as its own
      // temporary override, and can still grow with inflation for that
      // specific test.
      const defaultLiving = profile.expenses.living;
      const defaultChild = 0;
      const defaultTravel = (o.travelBudget != null ? o.travelBudget * inflationFactor : 0) / 12;
      const monthlyOverrides = isBaseline ? profile.monthlyBudget[String(y)] : null;

      let livingExpenses = 0, travelExpenses = 0, childExpenses = 0, otherExpenses = 0;
      for (let i = 0; i < 12; i++) {
        const date = new Date(today.getFullYear(), today.getMonth() + (y - 1) * 12 + i + 1, 1);
        const override = monthlyOverrides && monthlyOverrides[i];
        const resolved = isBaseline
          ? resolveMonthAmounts(profile, date.getFullYear(), date.getMonth(), { living: defaultLiving, travel: defaultTravel, child: defaultChild, other: 0 }, override)
          : { living: override ? override.living : defaultLiving, travel: override ? override.travel : defaultTravel, child: override ? override.child : defaultChild, other: (override && override.other != null) ? override.other : 0 };
        livingExpenses += resolved.living;
        travelExpenses += resolved.travel;
        childExpenses += resolved.child;
        otherExpenses += resolved.other;
      }

      const expenses = livingExpenses + childExpenses + travelExpenses + otherExpenses;
      const monthsInYear = cf.amort.schedule.filter(m => m.monthIndex >= (y - 1) * 12 && m.monthIndex < y * 12);
      const regularMortgagePaid = monthsInYear.reduce((s, m) => s + m.interest + m.principal, 0);
      const prepaymentPaid = monthsInYear.reduce((s, m) => s + (m.lumpSum || 0), 0);
      const mortgagePaidThisYear = regularMortgagePaid + prepaymentPaid;
      const growthFactor = Math.pow(1 + salaryGrowth / 100, y - 1);
      const income = (baseSalary * growthFactor + profile.income.bonus + profile.income.other) * 12;

      // Retirement: sum whatever's overridden per-month in Monthly
      // Forecast (Monthly Forecast is the source of truth), falling back
      // month-by-month to the Settings-derived default for any month not
      // explicitly overridden.
      let retirement;
      if (o.retirementContribution != null) {
        retirement = o.retirementContribution * 12;
      } else {
        const defaultMonthlyRetirement = isRetirementSavingActive(profile, y) ? profile.goals.retirementMonthly : 0;
        const monthlyOverridesForRetirement = isBaseline ? profile.monthlyBudget[String(y)] : null;
        retirement = 0;
        for (let i = 0; i < 12; i++) {
          const ov = monthlyOverridesForRetirement && monthlyOverridesForRetirement[i];
          retirement += (ov && ov.retirement != null) ? ov.retirement : defaultMonthlyRetirement;
        }
      }

      // One-time costs: Baby uses its own saved planned year as the
      // baseline (Simulator can temporarily override it to test moving
      // it). Wedding, Vehicle, House Extension, and Furnishing no longer
      // have dedicated planning fields — they're summed from whatever
      // Big Expense entries are saved for this year in Monthly Forecast.
      const babyYear = o.babyYear != null ? o.babyYear : profile.family.babyYear;

      let oneTimeCosts = 0;
      if (babyYear === y) oneTimeCosts += profile.family.pregnancyCost + profile.family.babyCost;
      if (isBaseline) {
        const bigExpenseOverrides = profile.monthlyBigExpenses[String(y)];
        if (bigExpenseOverrides) oneTimeCosts += bigExpenseOverrides.reduce((s, m) => s + ((m && m.amount) || 0), 0);
      }

      const netCash = income - expenses - mortgagePaidThisYear - retirement - oneTimeCosts;
      years.push({ year: y, income, livingExpenses, childExpenses, travelExpenses, otherExpenses, expenses, regularMortgagePaid, prepaymentPaid, mortgagePaidThisYear, retirement, oneTimeCosts, netCash });
    }
    return years;
  }

  // Builds a real 12-month breakdown for one projection year (1-10),
  // pulling exact mortgage figures (including any prepayment lump sum)
  // from the amortization schedule. Each month's Living/Travel/Child uses
  // actual Ledger data where it exists, else the saved Monthly Forecast
  // override for that month, else an even split of the year's total.
  function computeMonthlyForecast(profile, year, openingBalanceOverride) {
    const amort = computeAmortization(profile.mortgage);
    const tenYear = computeTenYearProjection(profile);
    const yearData = tenYear[year - 1];
    const overrides = profile.monthlyBudget[String(year)];

    const defaultIncome = yearData.income / 12;
    // Every category is now flat and fully manual — Monthly Forecast is
    // the source of truth for what you're actually planning to spend,
    // not an auto-filled or inflation-grown estimate. Living, Travel, and
    // Child all default from their current Settings/Retirement values
    // held flat across every year; edit any cell directly to change it.
    const defaultLiving = profile.expenses.living;
    const defaultTravel = 0;
    const defaultChild = 0;
    const defaultOther = 0;
    const defaultRetirement = yearData.retirement / 12;

    // Starting liquid cash for this year = the prior year's closing
    // balance carried forward, or today's cash when this is the first
    // forecast year. This keeps the monthly forecast aligned with the
    // actual end-of-year balance rather than just summing annual net cash.
    let runningBalance = openingBalanceOverride != null ? openingBalanceOverride : getLiquidCashTotal(profile);

    const bigExpenseOverrides = profile.monthlyBigExpenses[String(year)];
    const today = new Date();
    const rows = [];
    for (let i = 0; i < 12; i++) {
      // Date is computed independently of the amortization schedule's own
      // date field (which follows a "next payment" convention, one month
      // ahead) so Monthly Forecast can start at the current month while
      // still pulling the correct payment figures for that row. Because
      // of that one-month offset, the matching schedule entry has to be
      // looked up by actual calendar date, not by array position — a
      // positional index here would silently pull in next month's
      // mortgage figures (interest, principal, prepayment) instead of
      // this month's.
      const date = new Date(today.getFullYear(), today.getMonth() + (year - 1) * 12 + i, 1);
      const sched = amort.schedule.find(m => m.date.getFullYear() === date.getFullYear() && m.date.getMonth() === date.getMonth());
      const override = overrides && overrides[i];
      const resolved = resolveMonthAmounts(profile, date.getFullYear(), date.getMonth(), { living: defaultLiving, travel: defaultTravel, child: defaultChild, other: defaultOther }, override);
      // Retirement isn't Ledger-tracked, so it's a straight override-or-
      // default resolution rather than going through resolveMonthAmounts.
      const retirementForMonth = (override && override.retirement != null) ? override.retirement : defaultRetirement;
      const mortgageInterest = sched ? sched.interest : 0;
      const mortgagePrincipal = sched ? sched.principal : 0;
      const mortgageLump = sched ? (sched.lumpSum || 0) : 0;
      const prepayForMonth = (override && override.prepay != null) ? override.prepay : mortgageLump;
      // One-time costs land on their actual planned month by default, but
      // a saved override (edited directly in this table) takes precedence
      // — same pattern as Living/Travel/Child overrides above.
      const bigExpenseOverride = bigExpenseOverrides && bigExpenseOverrides[i];
      const bigExpense = bigExpenseOverride
        ? { total: bigExpenseOverride.amount || 0, description: bigExpenseOverride.description || "" }
        : getOneTimeCostsForMonth(profile, year, i + 1);
      const netCash = defaultIncome - resolved.living - resolved.travel - resolved.child - resolved.other - mortgageInterest - mortgagePrincipal - prepayForMonth - retirementForMonth - bigExpense.total;
      runningBalance += netCash;
      rows.push({
        monthNum: i + 1, date, income: defaultIncome,
        living: resolved.living, travel: resolved.travel, child: resolved.child, other: resolved.other,
        isActual: resolved.isActual,
        mortgageInterest, mortgagePrincipal, mortgageLump: prepayForMonth, retirement: retirementForMonth,
        bigExpenseAmount: bigExpense.total, bigExpenseDescription: bigExpense.description, bigExpenseIsOverride: !!bigExpenseOverride,
        netCash, runningBalance,
      });
    }
    return rows;
  }

  // Credit Sources aggregation — replaces the old single Cash/Credit Card
  // fields with a real list (Cash, Debit, Mobile Wallet, Credit Card,
  // Potential Income). Liquid = spendable now; Owed = credit card balances
  // (a liability); Potential = expected but not-yet-in-hand money, shown
  // separately and excluded from net worth so it doesn't overstate it.
  function getLiquidCashTotal(profile) {
    return profile.creditSources
      .filter(s => s.type === "cash" || s.type === "debit" || s.type === "wallet")
      .reduce((sum, s) => sum + (s.balance || 0), 0);
  }
  function getCreditOwedTotal(profile) {
    return profile.creditSources
      .filter(s => s.type === "credit_card")
      .reduce((sum, s) => sum + (s.balance || 0), 0);
  }
  function getPotentialIncomeTotal(profile) {
    return profile.creditSources
      .filter(s => s.type === "potential")
      .reduce((sum, s) => sum + (s.balance || 0), 0);
  }

  function computeNetWorth(profile) {
    const totalAssets = getLiquidCashTotal(profile) + profile.assets.emergencyFund + profile.assets.investments + profile.assets.houseValue + profile.assets.vehicleValue;
    const totalLiabilities = profile.mortgage.balance + getCreditOwedTotal(profile) + profile.liabilities.personalLoans;
    return {
      totalAssets, totalLiabilities,
      netWorth: totalAssets - totalLiabilities,
      homeEquity: profile.assets.houseValue - profile.mortgage.balance,
    };
  }

  // Future value of currentBalance + a monthly contribution annuity,
  // compounded monthly at the Settings investment return rate (or an
  // override rate/contribution from a preset or the Scenario Simulator).
  // Contributions only start at retirement.startYear (0 = now) — before
  // that, the balance still grows from currentBalance alone.
  function computeRetirementBalanceAt(profile, months, overrides) {
    const o = overrides || {};
    const r = ((o.investmentReturn != null ? o.investmentReturn : profile.settings.investmentReturn) / 100) / 12;
    const P = profile.retirement.currentBalance;
    const PMT = o.retirementContribution != null ? o.retirementContribution : profile.goals.retirementMonthly;
    // A Simulator override represents a hypothetical contribution starting
    // now, ignoring the saved start year, same as its other what-ifs.
    const delayMonths = (o.retirementContribution != null ? 0 : (profile.retirement.startYear || 0)) * 12;
    const contributingMonths = Math.max(0, months - delayMonths);
    if (r === 0) return P + PMT * contributingMonths;
    const fvPrincipal = P * Math.pow(1 + r, months);
    const fvAnnuity = PMT * ((Math.pow(1 + r, contributingMonths) - 1) / r);
    return fvPrincipal + fvAnnuity;
  }

  function computeRetirementProjection(profile, years) {
    const points = [];
    for (let y = 0; y <= years; y++) points.push({ year: y, balance: computeRetirementBalanceAt(profile, y * 12) });
    return points;
  }

  // Yearly net worth trajectory. Simplifications (v1): house/vehicle value
  // and emergency fund/credit-card/loan balances are held flat — there's no
  // appreciation, top-up, or paydown schedule for them yet. General
  // Investments compound at the Investment Return rate with no new
  // contributions (contributions are modeled only for Retirement above).
  // Cash absorbs each year's net cash flow from the 10-Year Projection.
  function computeNetWorthProjection(profile, years, overrides) {
    const o = overrides || {};
    const tenYear = computeTenYearProjection(profile, o);
    const amort = computeAmortization(profile.mortgage, o);
    const r = ((o.investmentReturn != null ? o.investmentReturn : profile.settings.investmentReturn) / 100);

    let cash = getLiquidCashTotal(profile);
    const points = [];
    points.push({ year: 0, netWorth: computeNetWorth(profile).netWorth });

    for (let y = 1; y <= years; y++) {
      cash += (tenYear[y - 1] ? tenYear[y - 1].netCash : 0);
      const investments = profile.assets.investments * Math.pow(1 + r, y);
      const retirementBalance = computeRetirementBalanceAt(profile, y * 12, o);
      const yearEndMonth = amort.schedule.filter(m => m.monthIndex < y * 12);
      const mortgageBalance = yearEndMonth.length ? yearEndMonth[yearEndMonth.length - 1].balance : Math.max(0, profile.mortgage.balance);

      const totalAssets = cash + profile.assets.emergencyFund + investments + profile.assets.houseValue + profile.assets.vehicleValue + retirementBalance;
      const totalLiabilities = mortgageBalance + getCreditOwedTotal(profile) + profile.liabilities.personalLoans;
      points.push({ year: y, netWorth: totalAssets - totalLiabilities, cash, mortgageBalance });
    }
    return points;
  }

  // Fixed-weight composite score (0-100). Each factor is independently
  // capped at 100 so no single strong factor can mask a weak one.
  // Net Worth Trend and Goal Progress are provisional until historical
  // net-worth snapshots (future enhancement) and the Goal Tracker (Phase 4)
  // exist — see inline notes below.
  function computeHealthScore(profile) {
    const cf = computeCashFlow(profile);
    const nw = computeNetWorth(profile);
    const amort = cf.amort;

    const efMonths = cf.monthlyExpenses > 0 ? profile.assets.emergencyFund / cf.monthlyExpenses : 0;
    const emergencyFundScore = Math.min(100, (efMonths / 6) * 100);

    // Debt-to-income uses the mortgage payment as the debt obligation —
    // credit card / personal loan minimum payments aren't modeled yet.
    const dti = cf.monthlyIncome > 0 ? cf.currentMortgagePayment / cf.monthlyIncome : 1;
    const debtScore = Math.max(0, 100 - Math.min(100, dti * 100));

    const savingsRate = cf.monthlyIncome > 0 ? cf.monthlySurplus / cf.monthlyIncome : 0;
    const savingsScore = Math.max(0, Math.min(100, savingsRate * 100));

    // Provisional proxy: no historical net-worth series is stored yet, so
    // "trending up" is approximated by whether monthly cash flow is positive.
    const netWorthTrendScore = cf.monthlySurplus > 0 ? 100 : (cf.monthlySurplus === 0 ? 50 : 0);

    let mortgageHealthScore = 50;
    if (amort.schedule.length) {
      if (amort.insufficientPayment) mortgageHealthScore = 0;
      else if (amort.schedule[0].principal > amort.schedule[0].interest) mortgageHealthScore = 100;
      else mortgageHealthScore = 60;
    }

    // Now that the Goal Tracker exists, average the percent-complete across
    // goals that have a target set. Falls back to a neutral midpoint only
    // if no goals have targets yet, so a fresh profile isn't penalized.
    const trackedGoals = computeGoalTracker(profile).filter(g => g.percent != null);
    const goalProgressScore = trackedGoals.length
      ? trackedGoals.reduce((sum, g) => sum + g.percent, 0) / trackedGoals.length
      : 50;

    const score = Math.round(
      emergencyFundScore * 0.20 +
      debtScore * 0.20 +
      savingsScore * 0.20 +
      netWorthTrendScore * 0.15 +
      mortgageHealthScore * 0.15 +
      goalProgressScore * 0.10
    );

    let label = "Needs Attention";
    if (score >= 80) label = "Excellent";
    else if (score >= 65) label = "Good";
    else if (score >= 45) label = "Fair";

    return { score, label, breakdown: { emergencyFundScore, debtScore, savingsScore, netWorthTrendScore, mortgageHealthScore, goalProgressScore } };
  }

  // Builds a compact, current snapshot of the person's real financial data
  // for the AI Insights chat's system prompt — so answers are grounded in
  // their actual numbers rather than generic advice. Kept to essentials
  // (not a full data dump) to leave room for a longer conversation.
  function buildFinancialContext(profile) {
    const nw = computeNetWorth(profile);
    const cf = computeCashFlow(profile);
    const health = computeHealthScore(profile);
    const amort = computeAmortization(profile.mortgage);
    const goals = computeGoalTracker(profile);
    const efMonths = cf.monthlyExpenses > 0 ? profile.assets.emergencyFund / cf.monthlyExpenses : 0;
    const cur = profile.settings.currency || "PHP";
    const fmt = v => formatCurrency(v, cur);

    const lines = [];
    lines.push("CURRENCY: " + cur);
    lines.push("NET WORTH: " + fmt(nw.netWorth) + " (Assets " + fmt(nw.totalAssets) + " / Liabilities " + fmt(nw.totalLiabilities) + ")");
    lines.push("LIQUID CASH: " + fmt(getLiquidCashTotal(profile)) + " | CREDIT OWED: " + fmt(getCreditOwedTotal(profile)));
    lines.push("MONTHLY: Income " + fmt(cf.monthlyIncome) + " / Expenses " + fmt(cf.monthlyExpenses) + " / Mortgage " + fmt(cf.currentMortgagePayment) + " / Surplus " + fmt(cf.monthlySurplus));
    lines.push("EMERGENCY FUND: " + fmt(profile.assets.emergencyFund) + " (" + efMonths.toFixed(1) + " months of expenses)");
    if (profile.mortgage.balance > 0) {
      lines.push("MORTGAGE: " + fmt(profile.mortgage.balance) + " remaining at " + profile.mortgage.interestRate + "% (reprices to " + profile.mortgage.repricingRate + "% after " + profile.mortgage.fixedYears + "yr fixed period), payoff est. " + (amort.payoffDate ? amort.payoffDate.toLocaleDateString(undefined, { year: "numeric", month: "short" }) : "unknown") + (profile.mortgage.annualPrepayment > 0 ? ", with an annual prepayment plan of " + fmt(profile.mortgage.annualPrepayment) : ""));
    }
    lines.push("RETIREMENT: " + fmt(profile.retirement.currentBalance) + " current" + (profile.retirement.targetBalance > 0 ? ", target " + fmt(profile.retirement.targetBalance) : "") + ", age " + profile.retirement.currentAge + " -> " + profile.retirement.retirementAge + ", contributing " + fmt(profile.goals.retirementMonthly) + "/mo");
    lines.push("FINANCIAL HEALTH SCORE: " + health.score + "/100 (" + health.label + ")");
    const goalLines = goals.filter(g => g.percent != null).map(g => g.label + " " + g.percent.toFixed(0) + "%").join(", ");
    if (goalLines) lines.push("GOALS: " + goalLines);
    return lines.join("\n");
  }

  // Retirement Planner: projects to a specific retirement age rather than a
  // fixed 10-year window, and supports temporary rate overrides for the
  // Conservative/Moderate/Aggressive presets (mirrors the mortgage
  // override pattern — presets never overwrite the saved Settings rate).
  function computeRetirementBalanceAtRate(profile, months, ratePct) {
    const r = (ratePct / 100) / 12;
    const P = profile.retirement.currentBalance;
    const PMT = profile.goals.retirementMonthly;
    const delayMonths = (profile.retirement.startYear || 0) * 12;
    const contributingMonths = Math.max(0, months - delayMonths);
    if (r === 0) return P + PMT * contributingMonths;
    const fvPrincipal = P * Math.pow(1 + r, months);
    const fvAnnuity = PMT * ((Math.pow(1 + r, contributingMonths) - 1) / r);
    return fvPrincipal + fvAnnuity;
  }

  function computeRetirementToAge(profile, ratePct) {
    const yearsToRetire = Math.max(0, profile.retirement.retirementAge - profile.retirement.currentAge);
    const points = [];
    for (let y = 0; y <= yearsToRetire; y++) {
      points.push({ year: y, age: profile.retirement.currentAge + y, balance: computeRetirementBalanceAtRate(profile, y * 12, ratePct) });
    }
    const finalBalance = points.length ? points[points.length - 1].balance : profile.retirement.currentBalance;
    // 4% rule: a widely-used rough estimate for sustainable annual withdrawal.
    const estimatedMonthlyPassiveIncome = (finalBalance * 0.04) / 12;
    return { yearsToRetire, points, finalBalance, estimatedMonthlyPassiveIncome };
  }

  function getCurrentMonthExpenseEntries(profile) {
    const now = new Date();
    return profile.expenseLog.filter(e => {
      const d = new Date(e.date);
      return !isNaN(d) && d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    });
  }

  // Compares actual logged spending this month against the budgeted
  // assumptions already used everywhere else (Settings' monthly Living/
  // Child, Travel's annual budget ÷ 12) — ties the Ledger's real
  // transactions back into the same numbers the rest of the app plans
  // against, rather than being a disconnected log.
  function computeActualVsBudget(profile) {
    const entries = getCurrentMonthExpenseEntries(profile).sort((a, b) => new Date(b.date) - new Date(a.date));
    const actualByCategory = { living: 0, travel: 0, child: 0, other: 0 };
    entries.forEach(e => { actualByCategory[e.category] = (actualByCategory[e.category] || 0) + e.amount; });
    const budget = {
      living: profile.expenses.living,
      travel: profile.goals.travelAnnual / 12,
      child: isChildActive(profile, 0) ? profile.expenses.child : 0,
      other: 0,
    };
    const totalActual = actualByCategory.living + actualByCategory.travel + actualByCategory.child + actualByCategory.other;
    const totalBudget = budget.living + budget.travel + budget.child;
    return { actualByCategory, budget, totalActual, totalBudget, entries };
  }

  function computeFamilySpending(profile) {
    const active = isChildActive(profile, 0);
    const annualChildcare = active ? profile.family.childcareMonthly * 12 : 0;
    const annualChildExpenses = active ? profile.expenses.child * 12 : 0;
    return { annualChildcare, annualChildExpenses, annualTotal: annualChildcare + annualChildExpenses, active };
  }

  function computeTravelSummary(profile) {
    const plannedTotal = profile.travel.trips.reduce((s, t) => s + (Number(t.cost) || 0), 0);
    const remaining = profile.goals.travelAnnual - profile.travel.actualExpenses;
    return { plannedTotal, remaining };
  }

  // Unified Goal Tracker: blends computed progress (mortgage, emergency
  // fund, retirement — driven by other modules, no manual entry) with
  // manually-tracked savings goals (wedding, house extension, furnishing,
  // travel, education, vehicle — where "saved so far" is user-entered
  // since FinancialGodun has no linked bank data to infer it from).
  function computeGoalTracker(profile) {
    const cf = computeCashFlow(profile);
    const amort = cf.amort;
    const goals = [];

    if (profile.mortgage.originalAmount > 0) {
      const percent = Math.min(100, Math.max(0, ((profile.mortgage.originalAmount - profile.mortgage.balance) / profile.mortgage.originalAmount) * 100));
      goals.push({ id: "mortgagePayoff", label: "Mortgage Payoff", percent, note: amort.payoffDate ? "Est. " + amort.payoffDate.toLocaleDateString(undefined, { year: "numeric", month: "short" }) : "—", computed: true });
    } else {
      goals.push({ id: "mortgagePayoff", label: "Mortgage Payoff", percent: null, note: "Set Original Loan Amount in Mortgage Planner to track %", computed: true });
    }

    const efTarget = cf.monthlyExpenses * 6;
    const efPercent = efTarget > 0 ? Math.min(100, (profile.assets.emergencyFund / efTarget) * 100) : 0;
    goals.push({ id: "emergencyFund", label: "Emergency Fund", percent: efPercent, note: formatCurrency(profile.assets.emergencyFund) + " of " + formatCurrency(efTarget) + " (6mo)", computed: true });

    if (profile.retirement.targetBalance > 0) {
      const retPercent = Math.min(100, (profile.retirement.currentBalance / profile.retirement.targetBalance) * 100);
      goals.push({ id: "retirement", label: "Retirement", percent: retPercent, note: formatCurrency(profile.retirement.currentBalance) + " of " + formatCurrency(profile.retirement.targetBalance), computed: true });
    } else {
      goals.push({ id: "retirement", label: "Retirement", percent: null, note: "Set a Target Balance in Retirement tab to track %", computed: true });
    }

    const manual = [
      { id: "travelAnnual", label: "Travel", target: profile.goals.travelAnnual, saved: profile.goalProgress.travelAnnual, plannedYear: null, yearPath: null, plannedMonth: null, monthPath: null },
      { id: "educationFund", label: "Child / Education Fund", target: profile.family.educationFundTarget, saved: profile.goalProgress.educationFund, plannedYear: null, yearPath: null, plannedMonth: null, monthPath: null },
    ];
    manual.forEach(g => {
      const percent = g.target > 0 ? Math.min(100, (g.saved / g.target) * 100) : null;
      goals.push({ id: g.id, label: g.label, percent, note: g.target > 0 ? formatCurrency(g.saved) + " of " + formatCurrency(g.target) : "No target set", computed: false, target: g.target, saved: g.saved, plannedYear: g.plannedYear, yearPath: g.yearPath, plannedMonth: g.plannedMonth, monthPath: g.monthPath });
    });

    return goals;
  }

  /* ==========================================================
     5. SECTION CONTENT RENDER
     ========================================================== */
  function placeholderHTML(section) {
    return `
      <div class="section-eyebrow">${String(SECTIONS.findIndex(s => s.id === section.id) + 1).padStart(2, "0")} / Module</div>
      <h1 class="section-title">${section.label}</h1>
      <p class="section-desc">This module is scheduled for Phase ${section.phase} of the build.</p>
      <div class="placeholder-card">
        <div class="placeholder-phase">Phase ${section.phase} — Not yet built</div>
        <h3>${section.label} is on the roadmap</h3>
        <p>Your Financial Profile data is already being captured in Settings, so once this module ships it will calculate immediately from real numbers — no re-entry needed.</p>

  function getCashflowPrepayPlan(profile) {
    const yearKeys = Object.keys(profile.monthlyBudget || {})
      .filter(key => /^\d+$/.test(key))
      .sort((a, b) => Number(a) - Number(b));
    const years = (yearKeys.length ? yearKeys : ["1"]).map(yearKey => {
      const saved = profile.monthlyBudget[String(yearKey)] || [];
      const amount = saved.reduce((sum, month) => {
        return sum + ((month && month.prepay != null) ? month.prepay : 0);
      }, 0);
      const start = new Date(new Date().getFullYear(), (Number(yearKey) - 1) * 12, 1);
      const end = new Date(start.getFullYear(), start.getMonth() + 12, 0);
      return {
        label: `${start.toLocaleDateString(undefined, { month: "short", year: "numeric" })} – ${end.toLocaleDateString(undefined, { month: "short", year: "numeric" })}`,
        amount,
      };
    });
    const total = years.reduce((sum, entry) => sum + entry.amount, 0);
    return { years, total };
  }

  function forecastCellHTML(r, idx, field) {

    let tableHTML;
    if (view === "monthly") {

        </table></div>

          <tbody>
            ${rows.map((r, idx) => forecastRowHTML(r, idx)).join("")}

  const CREDIT_SOURCE_TYPES = { cash: "Cash", debit: "Debit Account", wallet: "Mobile Wallet", credit_card: "Credit Card", potential: "Potential Income" };

  let ledgerView = "sources";

  /* ==========================================================
     AI INSIGHTS — chat grounded in the person's real financial data,
     calling the Anthropic API directly with their own key. This file
     runs standalone (not inside Claude.ai's artifact sandbox), so there's
     no proxied API access here — a real key from the person is required,
     stored locally, and used only for direct calls to api.anthropic.com.
     Chat history is kept in memory only (not persisted), so it resets on
     reload — deliberate, to avoid quietly accumulating chat logs in
     localStorage.
     ========================================================== */
  let chatMessages = [];
  let chatLoading = false;

  function getApiKey() {
    return localStorage.getItem(AI_KEY_STORAGE) || "";
  }
  function setApiKey(key) {
    if (key) localStorage.setItem(AI_KEY_STORAGE, key);
    else localStorage.removeItem(AI_KEY_STORAGE);
  }

  async function askAI(userMessage) {
    const apiKey = getApiKey();
    if (!apiKey) { showToast("Add your Anthropic API key in this tab first."); return; }

    chatMessages.push({ role: "user", content: userMessage });
    chatLoading = true;
    renderSections();
    navigateToCurrentHash();

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1024,
          system: "You are a financial insights assistant embedded in FinancialGodun, a personal wealth-planning app. Answer using ONLY the financial snapshot below — don't invent numbers. Be concise, warm, and practical; use the app's own currency formatting. If something isn't covered by this data, say so rather than guessing. You are not a licensed financial advisor — for major decisions, note that briefly rather than giving definitive directives.\n\nFINANCIAL SNAPSHOT:\n" + buildFinancialContext(profile),
          messages: chatMessages.map(m => ({ role: m.role, content: m.content })),
        }),
      });

      if (!response.ok) {
        const errBody = await response.json().catch(() => ({}));
        const msg = (errBody.error && errBody.error.message) || ("HTTP " + response.status);
        throw new Error(msg);
      }

      const data = await response.json();
      const text = (data.content || []).map(b => b.text || "").join("\n").trim() || "(No response text.)";
      chatMessages.push({ role: "assistant", content: text });
    } catch (err) {
      chatMessages.push({ role: "assistant", content: "Something went wrong: " + err.message + ". Double-check your API key and connection, then try again." });
    } finally {
      chatLoading = false;
      renderSections();
      navigateToCurrentHash();
      const chatScroll = document.getElementById("chatScroll");
      if (chatScroll) chatScroll.scrollTop = chatScroll.scrollHeight;
    }
  }

  const SUGGESTED_PROMPTS = [

    return `

      </div>
      ` : `

      `}
    `;
  }

  function getExpenseSubitemsTotal(entry) {
    return (entry.subitems || []).reduce((sum, sub) => sum + (parseFloat(sub.amount) || 0), 0);
  }

  function progressBar(percent) {

        <div style="background:${p >= 100 ? "var(--sage)" : "var(--brass)"}; width:${p}%; height:100%;"></div>
      </div>
    `;
  }

  function readSimulatorOverrides() {
    const el = (name) => document.querySelector(`#section-simulator [data-sim="${name}"]`);
    const num = (name) => { const e = el(name); return e ? getNumValue(e) : 0; };
    const overrides = {
      salary: num("salary"),
      salaryGrowth: num("salaryGrowth"),
      retirementContribution: num("retirementContribution"),
      travelBudget: num("travelBudget"),
      repricingRate: num("repricingRate"),
      investmentReturn: num("investmentReturn"),
    };
    const babyYear = num("babyYear");
    if (babyYear > 0) overrides.babyYear = babyYear;
    return overrides;
  }

  function simulatorResultsHTML(overrides) {
    const baseCF = computeCashFlow(profile);
    const scenCF = computeCashFlow(profile, overrides);
    const baseNW = computeNetWorthProjection(profile, 10);
    const scenNW = computeNetWorthProjection(profile, 10, overrides);
    const baseRetirement = computeRetirementBalanceAt(profile, (profile.retirement.retirementAge - profile.retirement.currentAge) * 12);
    const scenRetirement = computeRetirementBalanceAt(profile, (profile.retirement.retirementAge - profile.retirement.currentAge) * 12, overrides);
    const baseAmort = computeAmortization(profile.mortgage);
    const scenAmort = computeAmortization(profile.mortgage, overrides);

    const row = (label, base, scen, isCurrency) => {
      const fmt = v => isCurrency ? formatCurrency(v) : v;
      const delta = scen - base;
      const deltaClass = delta > 0 ? "positive" : (delta < 0 ? "negative" : "");
      return `<tr><td data-label="Metric"><strong>${label}</strong></td><td class="tnum" data-label="Baseline">${fmt(base)}</td><td class="tnum" data-label="Scenario">${fmt(scen)}</td><td class="tnum ${deltaClass}" data-label="Difference">${delta >= 0 ? "+" : ""}${isCurrency ? formatCurrency(delta) : delta}</td></tr>`;
    };

    return `
      <div class="ledger-card">
        <div class="group-title">Baseline vs. Scenario (${calendarYearFor(10)})</div>
        <div class="data-table-wrap data-table-cards"><table class="data-table">
          <thead><tr><th>Metric</th><th>Baseline</th><th>Scenario</th><th>Difference</th></tr></thead>
          <tbody>
            ${row("Net Worth (" + calendarYearFor(10) + ")", baseNW[10].netWorth, scenNW[10].netWorth, true)}
            ${row("Monthly Surplus", baseCF.monthlySurplus, scenCF.monthlySurplus, true)}
            ${row("Retirement Balance (at retirement age)", baseRetirement, scenRetirement, true)}
          </tbody>
        </table></div>
        <div class="kpi-sub" style="margin-top:10px;">Mortgage payoff — Baseline: ${baseAmort.payoffDate ? baseAmort.payoffDate.toLocaleDateString(undefined, { year: "numeric", month: "short" }) : "—"} · Scenario: ${scenAmort.payoffDate ? scenAmort.payoffDate.toLocaleDateString(undefined, { year: "numeric", month: "short" }) : "—"}</div>
      </div>
    `;
  }

  function updateSimulatorView() {
    const resultsEl = document.getElementById("simulatorResults");
    if (!resultsEl) return;
    const overrides = readSimulatorOverrides();
    resultsEl.innerHTML = simulatorResultsHTML(overrides);
    drawSimulatorChart(overrides);
  }

  function drawSimulatorChart(overrides) {
    if (typeof Chart === "undefined") return;
    const canvas = document.getElementById("chart-simulator");
    if (!canvas) return;
    const t = chartTheme();
    Chart.defaults.font.family = t.font;
    Chart.defaults.color = t.text;

    const base = computeNetWorthProjection(profile, 10);
    const scen = computeNetWorthProjection(profile, 10, overrides);
    destroyChart("simulator");
    chartInstances.simulator = new Chart(canvas, {
      type: "line",
      data: {
        labels: base.map(p => calendarYearFor(p.year)),
        datasets: [
          { label: "Baseline", data: base.map(p => p.netWorth), borderColor: t.text, backgroundColor: "transparent", borderDash: [4, 4], tension: 0.25, pointRadius: 0 },
          { label: "Scenario", data: scen.map(p => p.netWorth), borderColor: t.brass, backgroundColor: t.brass + "22", fill: true, tension: 0.25, pointRadius: 0 },
        ],
      },
      options: { ...chartOptions(t, v => formatCurrency(v)), plugins: { legend: { display: true, labels: { color: t.text, boxWidth: 10 } } } },
    });
  }

     6.5 REPORTS — data builders + export helpers

  function buildFinancialSummaryReport() {
    const cf = computeCashFlow(profile);
    const nw = computeNetWorth(profile);
    const health = computeHealthScore(profile);
    return [
      { metric: "Net Worth", value: nw.netWorth },
      { metric: "Total Assets", value: nw.totalAssets },
      { metric: "Total Liabilities", value: nw.totalLiabilities },
      { metric: "Home Equity", value: nw.homeEquity },
      { metric: "Monthly Income", value: cf.monthlyIncome },
      { metric: "Monthly Expenses", value: cf.monthlyExpenses },
      { metric: "Monthly Surplus", value: cf.monthlySurplus },
      { metric: "Financial Health Score", value: health.score },
      { metric: "Financial Health Label", value: health.label },
    ];
  }

  function buildMortgageSummaryReport() {
    const amort = computeAmortization(profile.mortgage);
    return amort.schedule.map(s => ({
      date: s.date.toISOString().slice(0, 7),
      rate: s.rate,
      interest: Math.round(s.interest),
      principal: Math.round(s.principal),
      annualPrepayment: Math.round(s.lumpSum || 0),
      balance: Math.round(s.balance),
    }));
  }

  function buildRetirementReport() {
    return computeRetirementToAge(profile, profile.settings.investmentReturn).points.map(p => ({
      year: p.year, age: p.age, balance: Math.round(p.balance),
    }));
  }

  function buildCashFlowReport() {
    let running = getLiquidCashTotal(profile);
    return computeTenYearProjection(profile).map(y => {
      running += y.netCash;
      return {
        year: y.year,
        calendarYear: calendarYearFor(y.year),
        income: Math.round(y.income),
        livingExpenses: Math.round(y.livingExpenses),
        travelExpenses: Math.round(y.travelExpenses),
        childExpenses: Math.round(y.childExpenses),
        otherExpenses: Math.round(y.otherExpenses || 0),
        totalExpenses: Math.round(y.expenses),
        regularMortgagePaid: Math.round(y.regularMortgagePaid),
        mortgagePrepayment: Math.round(y.prepaymentPaid),
        retirement: Math.round(y.retirement),
        oneTimeCosts: Math.round(y.oneTimeCosts || 0),
        netCash: Math.round(y.netCash),
        totalLiquidCash: Math.round(running),
      };
    });
  }

  function buildNetWorthReport() {
    return computeNetWorthProjection(profile, 10).map(p => ({
      year: p.year, calendarYear: calendarYearFor(p.year), netWorth: Math.round(p.netWorth),
    }));
  }

  function buildGoalProgressReport() {
    return computeGoalTracker(profile).map(g => ({
      goal: g.label,
      percentComplete: g.percent == null ? "—" : g.percent.toFixed(1),
      note: g.note,
    }));
  }

  function buildExpenseLogReport() {
    return profile.expenseLog.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).map(e => {
      const src = profile.creditSources.find(s => s.id === e.sourceId);
      return {
        date: e.date,
        category: EXPENSE_CATEGORIES[e.category] || e.category,
        amount: Math.round(e.amount),
        source: src ? src.name : "Unspecified",
        note: e.note || "",
      };
    });
  }

  function buildCreditSourcesReport() {
    return profile.creditSources.map(s => ({
      name: s.name,
      type: CREDIT_SOURCE_TYPES[s.type] || s.type,
      balance: Math.round(s.balance),
    }));
  }

  const REPORTS = [
    { id: "financial", label: "Financial Summary", build: buildFinancialSummaryReport },
    { id: "mortgage", label: "Mortgage Summary", build: buildMortgageSummaryReport },
    { id: "retirement", label: "Retirement Projection", build: buildRetirementReport },
    { id: "cashflow", label: "Cash Flow (10-Year)", build: buildCashFlowReport },

  function downloadBlob(content, mime, filename) {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function downloadReportJSON(report) {
    const stamp = new Date().toISOString().slice(0, 10);
    downloadBlob(JSON.stringify(report.build(), null, 2), "application/json", `financialgodun-${report.id}-${stamp}.json`);
    showToast(report.label + " exported as JSON.");
  }

  function downloadReportExcel(report) {
    if (typeof XLSX === "undefined") { showToast("Excel export library failed to load — check your connection."); return; }
    const stamp = new Date().toISOString().slice(0, 10);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(report.build()), report.label.slice(0, 31));
    XLSX.writeFile(wb, `financialgodun-${report.id}-${stamp}.xlsx`);
    showToast(report.label + " exported as Excel.");
  }

  function downloadFullReportExcel() {
    if (typeof XLSX === "undefined") { showToast("Excel export library failed to load — check your connection."); return; }
    const stamp = new Date().toISOString().slice(0, 10);
    const wb = XLSX.utils.book_new();

  }
