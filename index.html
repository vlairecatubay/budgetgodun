  function numField(path, label, value, step) {
    const isDecimal = !!(step && parseFloat(step) < 1);
    return `
      <div class="field">
        <label for="f-${path}">${label}</label>
        <input type="text" inputmode="decimal" id="f-${path}" data-path="${path}" data-numfmt="1" value="${formatNumberString(isDecimal ? value : Math.round(value))}" class="tnum">
        <a href="#" class="calc-link" data-calc-target="f-${path}">🧮 Calculator</a>
      </div>
    `;
  }

  // Reusable "planned year" selector — 0 means not planned/no date set yet,
  // 1-10 ties a big one-time expense to a specific projection year so it
  // actually gets counted in baseline Cash Flow, Dashboard, and Reports.
  function yearPlanSelect(path, label, currentYear) {
    return `
      <div class="field">
        <label for="f-${path}">${label}</label>
        <select id="f-${path}" data-path="${path}">
          <option value="0" ${currentYear === 0 ? "selected" : ""}>Not planned</option>
          ${Array.from({ length: 10 }, (_, idx) => idx + 1).map(y => `<option value="${y}" ${currentYear === y ? "selected" : ""}>${calendarYearFor(y)} (Year ${y})</option>`).join("")}
        </select>
      </div>
    `;
  }

  function resolvedMonthLabel(year, month) {
    const today = new Date();
    const d = new Date(today.getFullYear(), today.getMonth() + (year - 1) * 12 + ((month || 1) - 1), 1);
    return d.toLocaleDateString(undefined, { month: "short", year: "numeric" });
  }

  const MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

  // Companion month selector for a planned-year field. Month is 1-12,
  // meaning "the Nth month of that projection year" (month 1 of Year 1 is
  // the current month, since Monthly Forecast starts there) — not a
  // calendar month name by itself, so each option shows the actual
  // resolved month/year to stay unambiguous.
  function monthPlanSelect(path, label, currentYear, currentMonth) {
    if (!currentYear) return "";
    const today = new Date();
    return `
      <div class="field">
        <label for="f-${path}">${label}</label>
        <select id="f-${path}" data-path="${path}">
          ${Array.from({ length: 12 }, (_, idx) => idx + 1).map(m => {
            const d = new Date(today.getFullYear(), today.getMonth() + (currentYear - 1) * 12 + (m - 1), 1);
            const resolvedLabel = d.toLocaleDateString(undefined, { month: "short", year: "numeric" });
            return `<option value="${m}" ${(currentMonth || 1) === m ? "selected" : ""}>${resolvedLabel}</option>`;
          }).join("")}
        </select>
      </div>
    `;
  }

  function drawMortgageCharts() {
    if (typeof Chart === "undefined") return;
    const balanceCanvas = document.getElementById("chart-mortgage-balance");
    if (!balanceCanvas) return; // no schedule yet (balance/payment not set)

    const t = chartTheme();
    const m = profile.mortgage;
    const amort = computeAmortization(m);
    // Sample yearly points so long amortizations stay readable.
    const yearly = amort.schedule.filter(s => s.monthIndex % 12 === 0);
    const labels = yearly.map(s => s.date.getFullYear());

    Chart.defaults.font.family = t.font;
    Chart.defaults.color = t.text;

    destroyChart("balance");
    chartInstances.balance = new Chart(balanceCanvas, {
      type: "line",
      data: { labels, datasets: [{ label: "Balance", data: yearly.map(s => s.balance), borderColor: t.brass, backgroundColor: t.brass + "22", fill: true, tension: 0.25, pointRadius: 0 }] },
      options: chartOptions(t, v => formatCurrency(v)),
    });

    const first12 = amort.schedule.slice(0, 12);
    destroyChart("split");
    chartInstances.split = new Chart(document.getElementById("chart-mortgage-split"), {
      type: "bar",
      data: {
        labels: first12.map(s => s.date.toLocaleDateString(undefined, { month: "short" })),
        datasets: [
          { label: "Interest", data: first12.map(s => s.interest), backgroundColor: t.clay, stack: "s" },
          { label: "Principal", data: first12.map(s => s.principal), backgroundColor: t.sage, stack: "s" },
        ],
      },
      options: { ...chartOptions(t, v => formatCurrency(v)), scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, grid: { color: t.grid } } }, plugins: { legend: { display: true, labels: { color: t.text, boxWidth: 10 } } } },
    });

    let cumulative = 0;
    const cumulativeInterest = yearly.map((s, idx) => {
      const yearSlice = amort.schedule.slice(idx * 12, idx * 12 + 12);
      cumulative += yearSlice.reduce((sum, x) => sum + x.interest, 0);
      return cumulative;
    });
    destroyChart("interest");
    chartInstances.interest = new Chart(document.getElementById("chart-mortgage-interest"), {
      type: "line",
      data: { labels, datasets: [{ label: "Cumulative Interest", data: cumulativeInterest, borderColor: t.clay, backgroundColor: t.clay + "22", fill: true, tension: 0.25, pointRadius: 0 }] },
      options: chartOptions(t, v => formatCurrency(v)),
    });
  }

  // Live "what-if" for annual lump-sum prepayment — reads the explorer
  // input, recalculates without touching the saved profile, and updates
  // both a results summary and a balance-comparison chart.
  function updatePrepayExplorer() {
    const input = document.getElementById("prepayExplorerInput");
    const resultsEl = document.getElementById("prepayExplorerResults");
    if (!input || !resultsEl) return;

    const tryAmount = getNumValue(input);
    const m = profile.mortgage;
    const baseline = computeAmortization(m, { annualPrepayment: 0, prepaymentSchedule: [] });
    const withPrepay = computeAmortization(m, { annualPrepayment: tryAmount });

    const baselineYears = baseline.payoffMonths ? (baseline.payoffMonths / 12) : 0;
    const withYears = withPrepay.payoffMonths ? (withPrepay.payoffMonths / 12) : 0;
    const yearsSaved = Math.max(0, baselineYears - withYears);
    const yearsWhole = Math.floor(yearsSaved);
    const monthsRemainder = Math.round((yearsSaved - yearsWhole) * 12);
    const interestSaved = Math.max(0, baseline.totalInterest - withPrepay.totalInterest);

    resultsEl.innerHTML = `
      <div class="kpi-grid" style="margin-top:16px; margin-bottom:0;">
        <div class="kpi-card"><div class="kpi-label">Payoff — No Prepayment</div><div class="kpi-value tnum" style="font-size:16px;">${baseline.payoffDate ? baseline.payoffDate.toLocaleDateString(undefined, { year: "numeric", month: "short" }) : "—"}</div></div>
        <div class="kpi-card"><div class="kpi-label">Payoff — With ${formatCurrency(tryAmount)}/yr</div><div class="kpi-value tnum positive" style="font-size:16px;">${withPrepay.payoffDate ? withPrepay.payoffDate.toLocaleDateString(undefined, { year: "numeric", month: "short" }) : "—"}</div></div>
        <div class="kpi-card"><div class="kpi-label">Time Saved</div><div class="kpi-value tnum positive">${yearsWhole}y ${monthsRemainder}m</div></div>
        <div class="kpi-card"><div class="kpi-label">Interest Saved</div><div class="kpi-value tnum positive">${formatCurrency(interestSaved)}</div></div>
      </div>
    `;

    if (typeof Chart === "undefined") return;
    const canvas = document.getElementById("chart-prepay-explorer");
    if (!canvas) return;
    const t = chartTheme();
    Chart.defaults.font.family = t.font;
    Chart.defaults.color = t.text;

    const baseYearly = baseline.schedule.filter(s => s.monthIndex % 12 === 0);
    const prepayYearly = withPrepay.schedule.filter(s => s.monthIndex % 12 === 0);
    const labels = baseYearly.map(s => s.date.getFullYear());

    destroyChart("prepayExplorer");
    chartInstances.prepayExplorer = new Chart(canvas, {
      type: "line",
      data: {
        labels,
        datasets: [
          { label: "No Prepayment", data: baseYearly.map(s => s.balance), borderColor: t.text, backgroundColor: "transparent", borderDash: [4, 4], tension: 0.25, pointRadius: 0 },
          { label: "With Annual Prepayment", data: prepayYearly.map(s => s.balance), borderColor: t.sage, backgroundColor: t.sage + "22", fill: true, tension: 0.25, pointRadius: 0 },
        ],
      },
      options: { ...chartOptions(t, v => formatCurrency(v)), plugins: { legend: { display: true, labels: { color: t.text, boxWidth: 10 } } } },
    });
  }

  function drawCashflowCharts() {

    destroyChart("cashflow");

        options: chartOptions(t, v => formatCurrency(v)),
      });
    } else if (cashflowView === "forecast") {
      const rows = computeMonthlyForecast(profile, forecastYear || 1);
      chartInstances.cashflow = new Chart(canvas, {
        type: "bar",
        data: { labels: rows.map(r => r.date.toLocaleDateString(undefined, { month: "short" })), datasets: [{ label: "Net Cash", data: rows.map(r => r.netCash), backgroundColor: rows.map(r => r.netCash >= 0 ? t.sage : t.clay) }] },
        options: chartOptions(t, v => formatCurrency(v)),
      });
    } else {
      const cf = computeCashFlow(profile);
      const labels = ["Income", "Expenses", "Mortgage", "Retirement", "Remaining"];
      const values = [cf.monthlyIncome, -cf.monthlyExpenses, -cf.currentMortgagePayment, -cf.retirementContribution, cf.monthlySurplus];
      chartInstances.cashflow = new Chart(canvas, {
        type: "bar",
        data: { labels, datasets: [{ label: "Monthly", data: values, backgroundColor: values.map(v => v >= 0 ? t.sage : t.clay) }] },
        options: chartOptions(t, v => formatCurrency(v)),
      });
    }
  }

      options: { ...chartOptions(t, v => formatCurrency(v)), plugins: { legend: { display: true, labels: { color: t.text, boxWidth: 10 } } } },
    });

  function chartOptions(t, yFormat) {
    const reducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    return {
      responsive: true,
      maintainAspectRatio: false,
      animation: reducedMotion ? false : undefined,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: t.grid }, ticks: { color: t.text, font: { family: t.font, size: 10 } } },
        y: { grid: { color: t.grid }, ticks: { color: t.text, font: { family: t.font, size: 10 }, callback: yFormat } },
      },
    };

    content.innerHTML = SECTIONS.map(s => {
      let inner;
      if (s.id === "dashboard") inner = dashboardHTML();
      else if (s.id === "settings") inner = settingsHTML();
      else if (s.id === "mortgage") inner = mortgageHTML();
      else if (s.id === "cashflow") inner = cashflowHTML();
      else if (s.id === "ledger") inner = ledgerHTML();
      else if (s.id === "retirement") inner = retirementHTML();
      else if (s.id === "family") inner = familyHTML();
      else if (s.id === "travel") inner = travelHTML();
      else if (s.id === "goals") inner = goalsHTML();
      else if (s.id === "simulator") inner = simulatorHTML();
      else if (s.id === "reports") inner = reportsHTML();
      else inner = placeholderHTML(s);
      return `<section class="section" id="section-${s.id}">${inner}</section>`;
    }).join("");

    bindSettingsHandlers();
    bindMortgageHandlers();
    bindCashflowHandlers();
    bindLedgerHandlers();
    bindRetirementHandlers();
    bindFamilyHandlers();

  function bindCashflowHandlers() {
    const section = document.getElementById("section-cashflow");
    if (section) {
      section.addEventListener("focusin", (e) => {
        const row = e.target && e.target.closest ? e.target.closest("tr") : null;
        if (!row || !section.contains(row)) return;
        section.querySelectorAll("tr").forEach(tr => {
          tr.style.background = "";
          tr.style.boxShadow = "";
          tr.style.outline = "";
        });
        row.style.background = "rgba(232, 103, 125, 0.12)";
        row.style.boxShadow = "inset 0 0 0 1px rgba(232, 103, 125, 0.35)";
        row.style.outline = "1px solid rgba(232, 103, 125, 0.35)";
      });

      section.addEventListener("focusout", (e) => {
        const row = e.target && e.target.closest ? e.target.closest("tr") : null;
        if (!row || !section.contains(row)) return;
        const related = e.relatedTarget && e.relatedTarget.closest ? e.relatedTarget.closest("tr") : null;
        if (related && related === row) return;
        row.style.background = "";
        row.style.boxShadow = "";
        row.style.outline = "";
      });
    }

    document.querySelectorAll("#section-cashflow .view-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        cashflowView = tab.dataset.view;
        renderSections();
        navigateToCurrentHash();
      });
    });

    const yearSelect = document.getElementById("forecastYearSelect");
    if (yearSelect) yearSelect.addEventListener("change", () => {
      forecastYear = parseInt(yearSelect.value, 10);
      renderSections();
      navigateToCurrentHash();
    });

    function saveForecastBudget(year) {
      const months = Array.from({ length: 12 }, () => ({ living: 0, travel: 0, child: 0, other: 0, retirement: 0, prepay: 0 }));
      document.querySelectorAll("#section-cashflow [data-forecast-month]").forEach(input => {
        const idx = parseInt(input.dataset.forecastMonth, 10);
        const field = input.dataset.forecastField;
        months[idx][field] = getNumValue(input);
      });
      profile.monthlyBudget[String(year)] = months;

      const bigExpenses = Array.from({ length: 12 }, () => ({ amount: 0, description: "" }));
      document.querySelectorAll("#section-cashflow [data-bigexp-month]").forEach(input => {
        const idx = parseInt(input.dataset.bigexpMonth, 10);
        const field = input.dataset.bigexpField;
        bigExpenses[idx][field] = field === "amount" ? (getNumValue(input)) : input.value;
      });
      profile.monthlyBigExpenses[String(year)] = bigExpenses;

      Store.save(profile);
    }

    const saveBudgetBtn = document.getElementById("btnSaveForecastBudget");
    if (saveBudgetBtn) saveBudgetBtn.addEventListener("click", () => {
      const year = forecastYear || 1;
      saveForecastBudget(year);
      renderSections();
      navigateToCurrentHash();
      showToast("Budget saved for " + calendarYearFor(year) + ".");
    });

    // Auto-calculate: Living/Travel/Child and Big Expense Amount/
    // Description all save and recompute Net Cash + Balance the moment a
    // cell changes (blur / Enter) — no need to click Save budget first.
    document.querySelectorAll("#section-cashflow [data-forecast-month], #section-cashflow [data-bigexp-month]").forEach(input => {
      input.addEventListener("change", () => {
        const year = forecastYear || 1;
        saveForecastBudget(year);
        renderSections();
        navigateToCurrentHash();
      });
    });

    const resetBudgetBtn = document.getElementById("btnResetForecastBudget");
    if (resetBudgetBtn) resetBudgetBtn.addEventListener("click", () => {
      const year = forecastYear || 1;
      delete profile.monthlyBudget[String(year)];
      delete profile.monthlyBigExpenses[String(year)];
      Store.save(profile);
      renderSections();
      navigateToCurrentHash();
      showToast("Reset to auto-split for " + calendarYearFor(year) + ".");
    });
  }

  function bindLedgerHandlers() {
    const section = document.getElementById("section-ledger");
    if (!section) return;

    section.querySelectorAll(".view-tab[data-ledger-view]").forEach(tab => {
      tab.addEventListener("click", () => {
        ledgerView = tab.dataset.ledgerView;
        renderSections();

      });
    });

    const applySurplusBtn = document.getElementById("btnApplySurplusToMortgage");
    if (applySurplusBtn) applySurplusBtn.addEventListener("click", () => {
      const impact = computeMortgageSurplusImpact(profile);
      if (impact.surplus <= 0) return;
      if (!confirm("Apply " + formatCurrency(impact.surplus) + " to your mortgage principal right now? This permanently reduces your Remaining Loan Balance.")) return;
      profile.mortgage.balance = Math.max(0, profile.mortgage.balance - impact.surplus);
      Store.save(profile);
      renderSections();
      navigateToCurrentHash();
      showToast("Applied " + formatCurrency(impact.surplus) + " to your mortgage. New payoff date updated.");
    });

    const addSourceBtn = document.getElementById("btnAddSource");
    if (addSourceBtn) addSourceBtn.addEventListener("click", () => {
      const name = document.getElementById("newSourceName").value.trim();
      const type = document.getElementById("newSourceType").value;
      const balance = getNumValue(document.getElementById("newSourceBalance"));
      if (!name) { showToast("Enter a name for this source."); return; }
      profile.creditSources.push({ id: "src_" + Date.now(), name, type, balance });
      Store.save(profile);
      renderSections();
      navigateToCurrentHash();
      showToast("Source added.");
    });

    section.querySelectorAll("[data-edit-source]").forEach(b => {
      b.addEventListener("click", () => {
        const source = profile.creditSources.find(s => s.id === b.dataset.editSource);
        if (!source) return;
        const balanceText = prompt("Edit balance", String(source.balance || 0));
        if (balanceText === null) return;
        const balance = parseFloat(balanceText);
        if (Number.isNaN(balance)) {
          showToast("Please enter a valid numeric balance.");
          return;
        }
        source.balance = balance;
        Store.save(profile);
        renderSections();
        navigateToCurrentHash();
        showToast("Source updated.");
      });
    });

    section.querySelectorAll("[data-remove-source]").forEach(b => {
      b.addEventListener("click", () => {
        if (!confirm("Remove this source? Its balance won't be recovered elsewhere.")) return;
        profile.creditSources = profile.creditSources.filter(s => s.id !== b.dataset.removeSource);
        Store.save(profile);
        renderSections();
        navigateToCurrentHash();
      });
    });

    const addExpenseBtn = document.getElementById("btnAddExpense");
    if (addExpenseBtn) addExpenseBtn.addEventListener("click", () => {
      const date = document.getElementById("newExpenseDate").value || new Date().toISOString().slice(0, 10);
      const amount = getNumValue(document.getElementById("newExpenseAmount"));
      const category = document.getElementById("newExpenseCategory").value;
      const sourceId = document.getElementById("newExpenseSource").value;
      const note = document.getElementById("newExpenseNote").value.trim();
      if (amount <= 0) { showToast("Enter an amount greater than 0."); return; }

      profile.expenseLog.push({ id: "exp_" + Date.now(), date, amount, category, sourceId: sourceId || null, note, subitems: [] });

      // Logging against a real source actually moves money: spending
      // reduces a liquid source's balance, or increases what's owed on a
      // credit card — otherwise the Ledger would just be a wishlist.
      if (sourceId) {
        const src = profile.creditSources.find(s => s.id === sourceId);
        if (src) {
          if (src.type === "credit_card") src.balance += amount;
          else src.balance -= amount;
        }
      }

      Store.save(profile);
      renderSections();
      navigateToCurrentHash();
      showToast("Expense logged.");
    });

    section.querySelectorAll("[data-update-expense]").forEach(b => {
      b.addEventListener("click", () => {
        const entry = profile.expenseLog.find(e => e.id === b.dataset.updateExpense);
        if (!entry) return;
        const amountText = prompt("Edit expense amount", String(entry.amount || 0));
        if (amountText === null) return;
        const amount = parseFloat(amountText);
        if (Number.isNaN(amount) || amount <= 0) {
          showToast("Please enter a valid amount greater than 0.");
          return;
        }
        const note = prompt("Edit note", entry.note || "");
        if (note === null) return;
        entry.amount = amount;
        entry.note = note.trim();
        Store.save(profile);
        renderSections();
        navigateToCurrentHash();
        showToast("Expense updated.");
      });
    });

    section.querySelectorAll("[data-add-subitem]").forEach(b => {
      b.addEventListener("click", () => {
        const entry = profile.expenseLog.find(e => e.id === b.dataset.addSubitem);
        if (!entry) return;
        const name = prompt("Subitem name", "");
        if (name === null) return;
        const amountText = prompt("Subitem amount", "0");
        if (amountText === null) return;
        const amount = parseFloat(amountText);
        if (Number.isNaN(amount)) {
          showToast("Please enter a valid numeric amount.");
          return;
        }
        entry.subitems = entry.subitems || [];
        entry.subitems.push({ name: name.trim() || "Item", amount });
        Store.save(profile);
        renderSections();
        navigateToCurrentHash();
        showToast("Subitem added.");
      });
    });

    section.querySelectorAll("[data-remove-expense]").forEach(b => {
      b.addEventListener("click", () => {
        const entry = profile.expenseLog.find(e => e.id === b.dataset.removeExpense);
        if (entry && entry.sourceId) {
          const src = profile.creditSources.find(s => s.id === entry.sourceId);
          if (src) {
            if (src.type === "credit_card") src.balance -= entry.amount;
            else src.balance += entry.amount;
          }
        }
        profile.expenseLog = profile.expenseLog.filter(e => e.id !== b.dataset.removeExpense);
        Store.save(profile);
        renderSections();
        navigateToCurrentHash();
        showToast("Expense removed and balance restored.");
      });
    });
  }

    const keys = path.split(".");
    let cur = obj;
    for (let i = 0; i < keys.length - 1; i++) cur = cur[keys[i]];
    cur[keys[keys.length - 1]] = value;
  }

  /* ==========================================================
     7. JSON IMPORT / EXPORT
     ========================================================== */
  function exportJSON() {
    const blob = new Blob([JSON.stringify(profile, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `financialgodun-backup-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Backup downloaded.");
  }

  document.getElementById("importFileInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const parsed = JSON.parse(evt.target.result);
        profile = deepMerge(defaultProfile(), parsed);
        Store.save(profile);
        resetCustomBackground();
        resetCustomCardBackground();
        applyTheme(profile.settings.theme || "dark");
        applyPalette(profile.settings.palette || "brass");
        if (profile.settings.customBackground) applyCustomBackground(profile.settings.customBackground);
        else if (profile.settings.customCardBackground) applyCustomCardBackground(profile.settings.customCardBackground, true);
        renderSections();
        navigateToCurrentHash();
        showToast("Profile restored from backup.");
      } catch (err) {
        console.error(err);
        showToast("Restore failed — file is not valid JSON.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  /* ==========================================================

  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 2600);
  }

  /* ==========================================================
     9. INIT
     ========================================================== */
  function navigateToCurrentHash() {
    const hash = window.location.hash.replace("#", "");
    const valid = SECTIONS.some(s => s.id === hash);
    navigateTo(valid ? hash : "dashboard");
  }

  renderNav();
  renderBottomNav();
  renderSections();
  initTheme();
  navigateToCurrentHash();
  window.addEventListener("hashchange", navigateToCurrentHash);

})();
</script>
</body>
</html>
